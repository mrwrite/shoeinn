services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shoeinn_staging
    ports:
      - "5432:5432"
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shoeinn_staging"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env.staging
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -m alembic upgrade heads &&
      python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 10

  notification-worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env.staging
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    command: python -m app.workers.notification_worker
    restart: unless-stopped

volumes:
  pgdata_staging:
